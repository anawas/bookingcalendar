openapi: 3.1.0
info:
  title: Holiday Cottage Booking API
  version: 0.1.0
  description: Day-resolution API for holiday cottage availability and bookings.
servers:
  - url: http://localhost:8080
    description: Local Quarkus development server
tags:
  - name: Calendar
    description: Calendar availability endpoints
  - name: Bookings
    description: Guest booking endpoints
  - name: Unavailable Periods
    description: Owner-managed date blocks
paths:
  /api/calendar/availability:
    get:
      tags:
        - Calendar
      operationId: getAvailability
      summary: Get calendar availability
      description: Returns day-level availability for the requested date range.
      parameters:
        - $ref: "#/components/parameters/FromDate"
        - $ref: "#/components/parameters/ToDate"
      responses:
        "200":
          description: Availability for each day in the requested range.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AvailabilityResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/bookings:
    get:
      tags:
        - Bookings
      operationId: listBookings
      summary: List bookings
      description: Returns bookings that overlap the requested date range.
      parameters:
        - $ref: "#/components/parameters/FromDate"
        - $ref: "#/components/parameters/ToDate"
      responses:
        "200":
          description: Bookings in the requested range.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Booking"
        "400":
          $ref: "#/components/responses/BadRequest"
    post:
      tags:
        - Bookings
      operationId: createBooking
      summary: Create a booking
      description: Creates a booking for consecutive available days.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBookingRequest"
      responses:
        "201":
          description: Booking created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          $ref: "#/components/responses/Conflict"

  /api/bookings/{id}:
    get:
      tags:
        - Bookings
      operationId: getBooking
      summary: Get a booking
      parameters:
        - $ref: "#/components/parameters/BookingId"
      responses:
        "200":
          description: Booking details.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags:
        - Bookings
      operationId: cancelBooking
      summary: Cancel a booking
      parameters:
        - $ref: "#/components/parameters/BookingId"
      responses:
        "204":
          description: Booking canceled.
        "404":
          $ref: "#/components/responses/NotFound"

  /api/unavailable-periods:
    post:
      tags:
        - Unavailable Periods
      operationId: createUnavailablePeriod
      summary: Create an unavailable period
      description: Blocks consecutive days for maintenance, private use, or owner-defined closure.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUnavailablePeriodRequest"
      responses:
        "201":
          description: Unavailable period created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnavailablePeriod"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          $ref: "#/components/responses/Conflict"

  /api/unavailable-periods/{id}:
    delete:
      tags:
        - Unavailable Periods
      operationId: deleteUnavailablePeriod
      summary: Delete an unavailable period
      parameters:
        - $ref: "#/components/parameters/UnavailablePeriodId"
      responses:
        "204":
          description: Unavailable period deleted.
        "404":
          $ref: "#/components/responses/NotFound"

components:
  parameters:
    FromDate:
      name: from
      in: query
      required: true
      description: First date in the requested range, inclusive.
      schema:
        $ref: "#/components/schemas/LocalDate"
    ToDate:
      name: to
      in: query
      required: true
      description: Last date in the requested range, inclusive.
      schema:
        $ref: "#/components/schemas/LocalDate"
    BookingId:
      name: id
      in: path
      required: true
      description: Booking identifier.
      schema:
        type: string
        examples:
          - bkg_123
    UnavailablePeriodId:
      name: id
      in: path
      required: true
      description: Unavailable period identifier.
      schema:
        type: string
        examples:
          - unp_123

  responses:
    BadRequest:
      description: Invalid request.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Conflict:
      description: Requested dates conflict with an existing booking or unavailable period.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    LocalDate:
      type: string
      format: date
      description: Calendar date in YYYY-MM-DD format. No time or timezone is used.
      examples:
        - "2026-07-10"

    AvailabilityStatus:
      type: string
      enum:
        - available
        - booked
        - unavailable

    BookingStatus:
      type: string
      enum:
        - confirmed
        - canceled

    AvailabilityResponse:
      type: object
      required:
        - from
        - to
        - days
      properties:
        from:
          $ref: "#/components/schemas/LocalDate"
        to:
          $ref: "#/components/schemas/LocalDate"
        days:
          type: array
          items:
            $ref: "#/components/schemas/AvailabilityDay"

    AvailabilityDay:
      type: object
      required:
        - date
        - status
      properties:
        date:
          $ref: "#/components/schemas/LocalDate"
        status:
          $ref: "#/components/schemas/AvailabilityStatus"

    CreateBookingRequest:
      type: object
      required:
        - startDate
        - endDate
        - guestName
        - guestEmail
      properties:
        startDate:
          $ref: "#/components/schemas/LocalDate"
        endDate:
          $ref: "#/components/schemas/LocalDate"
        guestName:
          type: string
          minLength: 1
          maxLength: 120
          examples:
            - Andreas
        guestEmail:
          type: string
          format: email
          maxLength: 254
          examples:
            - andreas@example.com

    Booking:
      type: object
      required:
        - id
        - startDate
        - endDate
        - guestName
        - guestEmail
        - status
      properties:
        id:
          type: string
          examples:
            - bkg_123
        startDate:
          $ref: "#/components/schemas/LocalDate"
        endDate:
          $ref: "#/components/schemas/LocalDate"
        guestName:
          type: string
          examples:
            - Andreas
        guestEmail:
          type: string
          format: email
          examples:
            - andreas@example.com
        status:
          $ref: "#/components/schemas/BookingStatus"

    CreateUnavailablePeriodRequest:
      type: object
      required:
        - startDate
        - endDate
        - reason
      properties:
        startDate:
          $ref: "#/components/schemas/LocalDate"
        endDate:
          $ref: "#/components/schemas/LocalDate"
        reason:
          type: string
          minLength: 1
          maxLength: 200
          examples:
            - maintenance

    UnavailablePeriod:
      type: object
      required:
        - id
        - startDate
        - endDate
        - reason
      properties:
        id:
          type: string
          examples:
            - unp_123
        startDate:
          $ref: "#/components/schemas/LocalDate"
        endDate:
          $ref: "#/components/schemas/LocalDate"
        reason:
          type: string
          examples:
            - maintenance

    ErrorResponse:
      type: object
      required:
        - message
      properties:
        message:
          type: string
          examples:
            - The requested date range is invalid.
        code:
          type: string
          examples:
            - INVALID_DATE_RANGE
